name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Issues are public.** Do not include personal calendar data or screenshots showing private events.
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS (iPhone)
        - iPadOS (iPad)
        - visionOS
    validations:
      required: true
  - type: input
    id: os_version
    attributes:
      label: OS Version
      placeholder: "e.g. iOS 18.4"
    validations:
      required: true
  - type: input
    id: app_version
    attributes:
      label: App Version
      placeholder: "e.g. 1.2.0 — find it in Settings"
    validations:
      required: true
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: What did you expect, and what did you get instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Tap "Add Events" on the fasting template
        2. Grant Calendar permission
        3. Events do not appear in Calendar
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots welcome — blur any personal calendar data first.
